<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بازی دوز (Tic-Tac-Toe)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            padding: 20px; color: white;
        }
        .game {
            background: #1a1a1a; border-radius: 24px; padding: 2rem; width: 100%;
            max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); border: 2px solid #9b59b6;
            text-align: center;
        }
        .title { font-size: 1.8rem; color: #9b59b6; margin-bottom: 0.3rem; }
        .subtitle { color: #a2a8d3; margin-bottom: 1rem; font-size: 0.9rem; }
        .mode-select {
            display: flex; gap: 8px; justify-content: center; margin-bottom: 1.5rem;
        }
        .mode-btn {
            background: #2a2a2a; color: #ccc; border: 1px solid #444; padding: 8px 16px;
            border-radius: 20px; cursor: pointer; font-family: inherit; font-size: 0.85rem; transition: 0.3s;
        }
        .mode-btn.active { background: #9b59b6; color: white; border-color: #9b59b6; }
        .mode-btn:hover:not(.active) { background: #333; }
        .score-board {
            display: flex; justify-content: center; gap: 20px; margin-bottom: 1.5rem;
        }
        .score {
            text-align: center;
        }
        .score .player-name { font-size: 0.8rem; color: #888; }
        .score .player-score { font-size: 1.8rem; font-weight: bold; }
        .score.x-score { color: #e94560; }
        .score.o-score { color: #4ecca3; }
        .board {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
            max-width: 280px; margin: 0 auto 1.5rem;
        }
        .cell {
            aspect-ratio: 1; background: #0d0d1a; border: 2px solid #333; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; font-weight: bold; cursor: pointer; transition: all 0.3s;
        }
        .cell:hover:not(.taken) { background: #1a1a2e; border-color: #9b59b6; }
        .cell.taken { cursor: not-allowed; }
        .cell.x { color: #e94560; }
        .cell.o { color: #4ecca3; }
        .cell.win { animation: winPulse 0.6s ease-in-out 3; background: #1a1a2e; }
        @keyframes winPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(155, 89, 182, 0.5); }
            50% { transform: scale(1.1); box-shadow: 0 0 20px 10px rgba(155, 89, 182, 0.3); }
        }
        .status { min-height: 30px; font-size: 1.1rem; font-weight: bold; margin-bottom: 1rem; }
        .status.x-turn { color: #e94560; }
        .status.o-turn { color: #4ecca3; }
        .status.win { color: #f39c12; }
        .status.draw { color: #888; }
        .new-game-btn {
            background: #9b59b6; color: white; border: none; padding: 12px 30px;
            border-radius: 10px; font-weight: bold; cursor: pointer; font-family: inherit;
            font-size: 1rem; transition: 0.3s;
        }
        .new-game-btn:hover { background: #8e44ad; }
    </style>
</head>
<body>
    <div class="game">
        <div class="title">🎲 بازی دوز</div>
        <div class="subtitle">Tic-Tac-Toe</div>

        <!-- حالت بازی -->
        <div class="mode-select">
            <button class="mode-btn active" onclick="setMode('pvp')">👥 دو نفره</button>
            <button class="mode-btn" onclick="setMode('pve')">🤖 با کامپیوتر</button>
        </div>

        <!-- امتیازات -->
        <div class="score-board">
            <div class="score x-score">
                <div class="player-name">❌ (X)</div>
                <div class="player-score" id="scoreX">0</div>
            </div>
            <div class="score" style="color:#888;">
                <div class="player-name">مساوی</div>
                <div class="player-score" id="scoreDraw">0</div>
            </div>
            <div class="score o-score">
                <div class="player-name">⭕ (O)</div>
                <div class="player-score" id="scoreO">0</div>
            </div>
        </div>

        <!-- تخته -->
        <div class="board" id="board"></div>

        <!-- وضعیت -->
        <div class="status" id="status">نوبت ❌ (X)</div>

        <!-- دکمه -->
        <button class="new-game-btn" onclick="resetGame()">🔄 بازی جدید</button>
    </div>

    <script>
        let board = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'X';
        let gameMode = 'pvp'; // 'pvp' or 'pve'
        let gameActive = true;
        let scores = { X: 0, O: 0, draw: 0 };

        const winningCombos = [
            [0,1,2], [3,4,5], [6,7,8], // ردیف‌ها
            [0,3,6], [1,4,7], [2,5,8], // ستون‌ها
            [0,4,8], [2,4,6]            // قطرها
        ];

        function initBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            board.forEach((cell, index) => {
                const cellEl = document.createElement('div');
                cellEl.className = 'cell';
                if (cell) {
                    cellEl.classList.add('taken', cell === 'X' ? 'x' : 'o');
                    cellEl.textContent = cell === 'X' ? '❌' : '⭕';
                }
                cellEl.onclick = () => makeMove(index);
                boardEl.appendChild(cellEl);
            });
        }

        function setMode(mode) {
            gameMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`[onclick="setMode('${mode}')"]`).classList.add('active');
            resetGame();
        }

        function makeMove(index) {
            if (!gameActive || board[index] !== '') return;
            
            // جلوگیری از حرکت بازیکن در نوبت کامپیوتر
            if (gameMode === 'pve' && currentPlayer === 'O') return;

            placeMove(index, currentPlayer);
            
            if (gameActive && gameMode === 'pve' && currentPlayer === 'O') {
                setTimeout(computerMove, 400);
            }
        }

        function placeMove(index, player) {
            board[index] = player;
            initBoard();

            // بررسی برد
            const winCombo = checkWin(player);
            if (winCombo) {
                gameActive = false;
                highlightWinCells(winCombo);
                scores[player]++;
                updateScores();
                document.getElementById('status').textContent = `🎉 بازیکن ${player === 'X' ? '❌' : '⭕'} برنده شد!`;
                document.getElementById('status').className = 'status win';
                return;
            }

            // بررسی مساوی
            if (!board.includes('')) {
                gameActive = false;
                scores.draw++;
                updateScores();
                document.getElementById('status').textContent = '🤝 مساوی!';
                document.getElementById('status').className = 'status draw';
                return;
            }

            // تغییر نوبت
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            document.getElementById('status').textContent = `نوبت ${currentPlayer === 'X' ? '❌ (X)' : '⭕ (O)'}`;
            document.getElementById('status').className = `status ${currentPlayer === 'X' ? 'x-turn' : 'o-turn'}`;
        }

        function computerMove() {
            if (!gameActive) return;

            // الگوریتم ساده: اول برد، بعد جلوگیری از برد حریف، بعد وسط، بعد گوشه‌ها
            const emptyCells = board.map((cell, i) => cell === '' ? i : null).filter(i => i !== null);
            
            // ۱. بررسی برد کامپیوتر
            for (const i of emptyCells) {
                board[i] = 'O';
                if (checkWin('O')) {
                    board[i] = '';
                    placeMove(i, 'O');
                    return;
                }
                board[i] = '';
            }

            // ۲. جلوگیری از برد بازیکن
            for (const i of emptyCells) {
                board[i] = 'X';
                if (checkWin('X')) {
                    board[i] = '';
                    placeMove(i, 'O');
                    return;
                }
                board[i] = '';
            }

            // ۳. وسط
            if (emptyCells.includes(4)) {
                placeMove(4, 'O');
                return;
            }

            // ۴. گوشه‌ها
            const corners = [0, 2, 6, 8].filter(c => emptyCells.includes(c));
            if (corners.length > 0) {
                const pick = corners[Math.floor(Math.random() * corners.length)];
                placeMove(pick, 'O');
                return;
            }

            // ۵. تصادفی
            const random = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            placeMove(random, 'O');
        }

        function checkWin(player) {
            for (const combo of winningCombos) {
                if (combo.every(i => board[i] === player)) {
                    return combo;
                }
            }
            return null;
        }

        function highlightWinCells(combo) {
            const cells = document.querySelectorAll('.cell');
            combo.forEach(i => cells[i].classList.add('win'));
        }

        function updateScores() {
            document.getElementById('scoreX').textContent = scores.X;
            document.getElementById('scoreO').textContent = scores.O;
            document.getElementById('scoreDraw').textContent = scores.draw;
        }

        function resetGame() {
            board = ['', '', '', '', '', '', '', '', ''];
            currentPlayer = 'X';
            gameActive = true;
            initBoard();
            document.getElementById('status').textContent = 'نوبت ❌ (X)';
            document.getElementById('status').className = 'status x-turn';
        }

        // شروع
        initBoard();
    </script>
</body>
</html>
