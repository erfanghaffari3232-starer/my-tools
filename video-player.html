<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پخش کننده ویدئو حرفه‌ای</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding: 20px;
        }
        .player-container {
            width: 100%;
            max-width: 900px;
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(233, 69, 96, 0.3);
            border: 2px solid #333;
        }
        .video-wrapper {
            position: relative;
            background: #000;
            cursor: pointer;
        }
        video {
            width: 100%;
            display: block;
            max-height: 500px;
            object-fit: contain;
        }
        .controls {
            background: #1a1a1a;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            overflow: visible;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            border-radius: 10px;
            width: 0%;
            transition: width 0.1s linear;
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            left: 100%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #e94560;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .progress-bar:hover .progress-fill::after {
            opacity: 1;
        }
        .buttons-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            background: #2a2a2a;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid #444;
        }
        button:hover {
            background: #e94560;
            border-color: #e94560;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.4);
        }
        button:active {
            transform: scale(0.95);
        }
        .time-display {
            color: #ccc;
            font-family: monospace;
            font-size: 1rem;
            margin: 0 10px;
            direction: ltr;
            display: inline-block;
        }
        .volume-slider {
            width: 100px;
            accent-color: #e94560;
            cursor: pointer;
        }
        .speed-select {
            background: #2a2a2a;
            color: white;
            border: 1px solid #444;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .file-input {
            display: none;
        }
        .file-label {
            background: #533483;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid #6c3fa0;
            transition: 0.3s;
            text-align: center;
        }
        .file-label:hover {
            background: #e94560;
            border-color: #e94560;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 15px 0 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .title {
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .fullscreen-btn {
            background: #2a2a2a;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 2rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <!-- نوار بالایی -->
        <div class="top-bar">
            <span class="title">🎬 پخش‌کننده ویدئو</span>
            <label class="file-label" for="videoFile">📂 انتخاب فایل ویدئو</label>
            <input type="file" id="videoFile" class="file-input" accept="video/*">
        </div>

        <!-- بخش ویدئو -->
        <div class="video-wrapper" id="videoWrapper">
            <video id="myVideo" controlsList="nodownload">
                <source src="" type="video/mp4">
                مرورگر شما از ویدئو پشتیبانی نمی‌کند.
            </video>
            <div class="loading" id="loading">⏳ در حال بارگذاری...</div>
        </div>

        <!-- کنترل‌ها -->
        <div class="controls">
            <!-- نوار پیشرفت -->
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <!-- دکمه‌ها -->
            <div class="buttons-row">
                <button id="playPauseBtn" onclick="togglePlay()">▶️ پخش</button>
                <button onclick="skip(-10)">⏪ -10s</button>
                <button onclick="skip(10)">⏩ +10s</button>
                <span class="time-display" id="timeDisplay">00:00 / 00:00</span>
                
                <button id="muteBtn" onclick="toggleMute()">🔊</button>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.1" value="1" oninput="changeVolume(this.value)">
                
                <select class="speed-select" id="speedSelect" onchange="changeSpeed(this.value)">
                    <option value="0.5">0.5x</option>
                    <option value="0.75">0.75x</option>
                    <option value="1" selected>1x</option>
                    <option value="1.5">1.5x</option>
                    <option value="2">2x</option>
                </select>

                <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ تمام‌صفحه</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('myVideo');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const timeDisplay = document.getElementById('timeDisplay');
        const volumeSlider = document.getElementById('volumeSlider');
        const muteBtn = document.getElementById('muteBtn');
        const loading = document.getElementById('loading');
        const videoFile = document.getElementById('videoFile');

        // بارگذاری فایل ویدئو
        videoFile.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                video.src = url;
                video.load();
                video.play();
                playPauseBtn.textContent = '⏸️ توقف';
                loading.style.display = 'block';
            }
        });

        // پخش/توقف
        function togglePlay() {
            if (video.paused) {
                video.play();
                playPauseBtn.textContent = '⏸️ توقف';
            } else {
                video.pause();
                playPauseBtn.textContent = '▶️ پخش';
            }
        }
        video.addEventListener('click', togglePlay);
        video.addEventListener('play', () => playPauseBtn.textContent = '⏸️ توقف');
        video.addEventListener('pause', () => playPauseBtn.textContent = '▶️ پخش');
        video.addEventListener('waiting', () => loading.style.display = 'block');
        video.addEventListener('canplay', () => loading.style.display = 'none');

        // نوار پیشرفت
        video.addEventListener('timeupdate', updateProgress);
        function updateProgress() {
            const percent = (video.currentTime / video.duration) * 100 || 0;
            progressFill.style.width = percent + '%';
            
            const current = formatTime(video.currentTime);
            const total = formatTime(video.duration);
            timeDisplay.textContent = `${current} / ${total}`;
        }
        progressBar.addEventListener('click', function(e) {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            video.currentTime = percent * video.duration;
        });

        // پرش
        function skip(seconds) {
            video.currentTime = Math.max(0, Math.min(video.duration, video.currentTime + seconds));
        }

        // صدا
        function changeVolume(value) {
            video.volume = value;
            video.muted = false;
            updateMuteButton();
        }
        function toggleMute() {
            video.muted = !video.muted;
            updateMuteButton();
        }
        function updateMuteButton() {
            if (video.muted || video.volume === 0) {
                muteBtn.textContent = '🔇';
            } else if (video.volume < 0.5) {
                muteBtn.textContent = '🔉';
            } else {
                muteBtn.textContent = '🔊';
            }
        }
        video.addEventListener('volumechange', () => {
            volumeSlider.value = video.volume;
            updateMuteButton();
        });

        // سرعت
        function changeSpeed(speed) {
            video.playbackRate = parseFloat(speed);
        }

        // تمام صفحه
        function toggleFullscreen() {
            const wrapper = document.getElementById('videoWrapper');
            if (!document.fullscreenElement) {
                if (wrapper.requestFullscreen) {
                    wrapper.requestFullscreen();
                } else if (wrapper.webkitRequestFullscreen) {
                    wrapper.webkitRequestFullscreen();
                } else if (wrapper.msRequestFullscreen) {
                    wrapper.msRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // کیبورد
        document.addEventListener('keydown', function(e) {
            switch(e.key.toLowerCase()) {
                case ' ': e.preventDefault(); togglePlay(); break;
                case 'arrowright': skip(10); break;
                case 'arrowleft': skip(-10); break;
                case 'arrowup': video.volume = Math.min(1, video.volume + 0.1); volumeSlider.value = video.volume; break;
                case 'arrowdown': video.volume = Math.max(0, video.volume - 0.1); volumeSlider.value = video.volume; break;
                case 'm': toggleMute(); break;
                case 'f': toggleFullscreen(); break;
            }
        });

        // فرمت زمان
        function formatTime(seconds) {
            if (isNaN(seconds)) return '00:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }
    </script>
</body>
</html>
