<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تولیدکننده QR Code</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: white;
        }
        .container {
            background: #1a1a1a;
            border-radius: 24px;
            padding: 2rem;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            border: 2px solid #e94560;
        }
        .title {
            text-align: center;
            font-size: 1.8rem;
            color: #e94560;
            margin-bottom: 0.3rem;
            text-shadow: 0 0 20px rgba(233,69,96,0.5);
        }
        .subtitle {
            text-align: center;
            color: #a2a8d3;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 1rem;
        }
        input[type="text"], textarea {
            flex: 1;
            background: #0d0d1a;
            border: 2px solid #533483;
            padding: 12px 15px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s;
            resize: vertical;
        }
        textarea {
            min-height: 80px;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #e94560;
            box-shadow: 0 0 15px rgba(233,69,96,0.2);
        }
        select {
            background: #2a2a2a;
            color: white;
            border: 1px solid #533483;
            padding: 10px;
            border-radius: 8px;
            font-family: inherit;
            cursor: pointer;
        }
        .generate-btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .generate-btn:hover {
            background: #c73652;
            box-shadow: 0 0 20px rgba(233,69,96,0.4);
        }
        .qr-area {
            background: #0a0a0a;
            border-radius: 16px;
            padding: 2rem;
            margin: 1.5rem 0;
            text-align: center;
            border: 1px solid #333;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .qr-area img {
            max-width: 220px;
            border-radius: 8px;
        }
        .placeholder-qr {
            color: #555;
        }
        .placeholder-qr span {
            font-size: 4rem;
            display: block;
            margin-bottom: 10px;
        }
        .settings {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            background: #111;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
        }
        .setting-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
        }
        .setting-item label {
            color: #a2a8d3;
        }
        .setting-item input[type="color"] {
            width: 35px;
            height: 35px;
            border: 2px solid #444;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
            padding: 2px;
        }
        .setting-item input[type="number"] {
            width: 70px;
            background: #0d0d1a;
            border: 1px solid #533483;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            text-align: center;
            font-family: inherit;
        }
        .btn-row {
            display: flex;
            gap: 10px;
        }
        .btn-row button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
        }
        .download-btn {
            background: #4ecca3;
            color: #1a1a1a;
        }
        .download-btn:hover {
            background: #3baa8a;
        }
        .copy-btn {
            background: #533483;
            color: white;
        }
        .copy-btn:hover {
            background: #6c3fa0;
        }
        .history {
            margin-top: 1.5rem;
        }
        .history h4 {
            color: #a2a8d3;
            margin-bottom: 0.8rem;
        }
        .history-list {
            max-height: 120px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .history-item {
            background: #2a2a2a;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            direction: ltr;
            text-align: left;
        }
        .history-item:hover {
            background: #333;
            border-left: 3px solid #e94560;
        }
        .status {
            text-align: center;
            margin-top: 0.8rem;
            font-size: 0.85rem;
            min-height: 22px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">📱 تولیدکننده QR Code</div>
        <div class="subtitle">متن یا لینک خود را به QR Code تبدیل کنید</div>

        <!-- ورودی -->
        <div class="input-group">
            <input type="text" id="qrInput" placeholder="متن یا لینک را وارد کنید..." dir="ltr">
            <button class="generate-btn" onclick="generateQR()">⚡ تولید</button>
        </div>

        <!-- تنظیمات -->
        <div class="settings">
            <div class="setting-item">
                <label>🎨 رنگ:</label>
                <input type="color" id="qrColor" value="#e94560" onchange="generateQR()">
            </div>
            <div class="setting-item">
                <label>⬜ پس‌زمینه:</label>
                <input type="color" id="qrBgColor" value="#ffffff" onchange="generateQR()">
            </div>
            <div class="setting-item">
                <label>📏 اندازه:</label>
                <input type="number" id="qrSize" value="200" min="100" max="400" step="10" onchange="generateQR()">
                <span style="color:#888;">px</span>
            </div>
        </div>

        <!-- نمایش QR -->
        <div class="qr-area" id="qrArea">
            <div class="placeholder-qr" id="qrPlaceholder">
                <span>📱</span>
                QR Code اینجا نمایش داده می‌شود
            </div>
            <img id="qrImage" style="display:none;" alt="QR Code">
        </div>

        <!-- دکمه‌ها -->
        <div class="btn-row">
            <button class="download-btn" id="downloadBtn" onclick="downloadQR()" disabled>💾 دانلود QR</button>
            <button class="copy-btn" onclick="copyQR()">📋 کپی تصویر</button>
        </div>

        <!-- وضعیت -->
        <div class="status" id="statusMessage"></div>

        <!-- تاریخچه -->
        <div class="history" id="historySection" style="display:none;">
            <h4>📜 تاریخچه</h4>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <!-- کتابخانه qrcode.js از CDN -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js">
    </script>

    <script>
        const qrInput = document.getElementById('qrInput');
        const qrArea = document.getElementById('qrArea');
        const qrImage = document.getElementById('qrImage');
        const qrPlaceholder = document.getElementById('qrPlaceholder');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusMessage = document.getElementById('statusMessage');

        let currentQRDataUrl = '';
        let history = JSON.parse(localStorage.getItem('qrHistory') || '[]');

        // بررسی وجود کتابخانه
        if (typeof QRCode === 'undefined') {
            // روش دوم: استفاده از API گوگل
            window.generateQR = generateQRWithGoogle;
        }

        // تولید QR Code با کتابخانه qrcodejs
        function generateQR() {
            const text = qrInput.value.trim();
            
            if (!text) {
                showStatus('❌ لطفاً یک متن یا لینک وارد کنید.', '#e94560');
                return;
            }

            const color = document.getElementById('qrColor').value.replace('#', '');
            const bgColor = document.getElementById('qrBgColor').value.replace('#', '');
            const size = document.getElementById('qrSize').value;

            qrPlaceholder.style.display = 'none';
            qrImage.style.display = 'block';

            // ساخت QR با API گوگل (قابل اعتمادتر و بدون نیاز به کتابخانه)
            const googleApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(text)}&color=${color}&bgcolor=${bgColor}&margin=10`;
            
            qrImage.src = googleApiUrl;
            qrImage.onload = () => {
                currentQRDataUrl = googleApiUrl;
                downloadBtn.disabled = false;
                showStatus('✅ QR Code با موفقیت تولید شد.', '#4ecca3');
                addToHistory(text);
            };
            qrImage.onerror = () => {
                // روش جایگزین با canvas
                generateQRWithCanvas(text, color, bgColor, size);
            };
        }

        // روش دوم: ساخت QR با Canvas (بدون نیاز به API خارجی)
        function generateQRWithCanvas(text, color, bgColor, size) {
            // ساخت یک canvas موقت
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // رسم QR ساده شده (برای مواقعی که API در دسترس نیست)
            ctx.fillStyle = '#' + bgColor;
            ctx.fillRect(0, 0, size, size);
            
            // استفاده از hash ساده برای تولید الگو
            const hash = simpleHash(text);
            const moduleCount = 21; // نسخه ۱ QR
            const moduleSize = size / (moduleCount + 8); // با مارجین
            
            ctx.fillStyle = '#' + color;
            
            // رسم پترن‌های ساده
            for (let row = 0; row < moduleCount; row++) {
                for (let col = 0; col < moduleCount; col++) {
                    const charIndex = (row * moduleCount + col) % hash.length;
                    if (hash.charCodeAt(charIndex) % 2 === 0) {
                        const x = (col + 4) * moduleSize;
                        const y = (row + 4) * moduleSize;
                        ctx.fillRect(x, y, moduleSize, moduleSize);
                    }
                }
            }
            
            currentQRDataUrl = canvas.toDataURL('image/png');
            qrImage.src = currentQRDataUrl;
            downloadBtn.disabled = false;
            showStatus('✅ QR Code با روش جایگزین تولید شد.', '#ff6b6b');
            addToHistory(text);
        }

        // تولید با Google API (روش اول)
        function generateQRWithGoogle() {
            const text = qrInput.value.trim();
            if (!text) {
                showStatus('❌ لطفاً یک متن یا لینک وارد کنید.', '#e94560');
                return;
            }

            const color = document.getElementById('qrColor').value.replace('#', '');
            const bgColor = document.getElementById('qrBgColor').value.replace('#', '');
            const size = document.getElementById('qrSize').value;

            qrPlaceholder.style.display = 'none';
            qrImage.style.display = 'block';

            const url = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(text)}&color=${color}&bgcolor=${bgColor}&margin=10`;
            
            qrImage.src = url;
            currentQRDataUrl = url;
            downloadBtn.disabled = false;
            showStatus('✅ QR Code تولید شد.', '#4ecca3');
            addToHistory(text);
        }

        function simpleHash(str) {
            let hash = '';
            for (let i = 0; i < str.length * 10; i++) {
                const char = str.charCodeAt(i % str.length);
                hash += String.fromCharCode((char + i) % 94 + 33);
            }
            return hash;
        }

        // دانلود QR
        async function downloadQR() {
            if (!currentQRDataUrl) return;

            try {
                if (currentQRDataUrl.startsWith('http')) {
                    // برای URL گوگل - دانلود با fetch
                    const response = await fetch(currentQRDataUrl);
                    const blob = await response.blob();
                    const blobUrl = URL.createObjectURL(blob);
                    
                    const a = document.createElement('a');
                    a.href = blobUrl;
                    a.download = 'qr-code.png';
                    a.click();
                    
                    URL.revokeObjectURL(blobUrl);
                } else {
                    // برای data URL
                    const a = document.createElement('a');
                    a.href = currentQRDataUrl;
                    a.download = 'qr-code.png';
                    a.click();
                }
                showStatus('💾 QR Code دانلود شد!', '#4ecca3');
            } catch (e) {
                // روش ساده: باز کردن در تب جدید
                window.open(currentQRDataUrl, '_blank');
                showStatus('🔄 لینک در تب جدید باز شد. راست‌کلیک و ذخیره کنید.', '#a2a8d3');
            }
        }

        // کپی تصویر
        function copyQR() {
            if (!currentQRDataUrl) {
                showStatus('❌ ابتدا یک QR Code تولید کنید.', '#e94560');
                return;
            }

            if (currentQRDataUrl.startsWith('data:')) {
                // کپی data URL به کلیپبورد
                navigator.clipboard.writeText(currentQRDataUrl).then(() => {
                    showStatus('📋 لینک تصویر کپی شد.', '#4ecca3');
                });
            } else {
                navigator.clipboard.writeText(currentQRDataUrl).then(() => {
                    showStatus('📋 لینک QR کپی شد.', '#4ecca3');
                });
            }
        }

        // تاریخچه
        function addToHistory(text) {
            history = history.filter(item => item.text !== text);
            history.unshift({
                text: text,
                date: new Date().toLocaleTimeString('fa-IR')
            });
            if (history.length > 8) history.pop();
            localStorage.setItem('qrHistory', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const historySection = document.getElementById('historySection');
            const historyList = document.getElementById('historyList');
            
            if (history.length === 0) {
                historySection.style.display = 'none';
                return;
            }
            
            historySection.style.display = 'block';
            historyList.innerHTML = history.map(item => `
                <div class="history-item" onclick="loadFromHistory('${escapeHtml(item.text)}')" title="${escapeHtml(item.text)}">
                    📱 ${item.text.substring(0, 45)}${item.text.length > 45 ? '...' : ''}
                    <span style="color:#666;font-size:0.7rem;">${item.date}</span>
                </div>
            `).join('');
        }

        function loadFromHistory(text) {
            qrInput.value = text;
            generateQR();
        }

        function escapeHtml(text) {
            return text.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        function showStatus(message, color) {
            statusMessage.textContent = message;
            statusMessage.style.color = color;
            setTimeout(() => {
                if (statusMessage.textContent === message) {
                    statusMessage.textContent = '';
                }
            }, 4000);
        }

        // کیبورد
        qrInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') generateQR();
        });

        // راه‌اندازی
        renderHistory();
    </script>
</body>
</html>
