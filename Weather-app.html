<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آب و هوا</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            padding: 20px; color: white;
        }
        .app {
            background: #1a1a1a; border-radius: 24px; padding: 2rem; width: 100%;
            max-width: 450px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); border: 2px solid #e94560;
            text-align: center;
        }
        .title { font-size: 1.8rem; color: #e94560; margin-bottom: 1.5rem; }
        .search-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }
        .search-row input {
            flex: 1; background: #0d0d1a; border: 2px solid #533483; padding: 12px;
            border-radius: 10px; color: white; font-size: 1rem; font-family: inherit;
        }
        .search-row input:focus { outline: none; border-color: #e94560; }
        .search-row button {
            background: #e94560; color: white; border: none; padding: 12px 20px;
            border-radius: 10px; font-weight: bold; cursor: pointer; font-family: inherit; font-size: 1rem;
        }
        .search-row button:hover { background: #c73652; }
        .weather-card {
            background: linear-gradient(135deg, #0f0c29, #302b63); border-radius: 20px;
            padding: 2rem; display: none; border: 1px solid #533483;
        }
        .weather-card.show { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .city-name { font-size: 1.5rem; margin-bottom: 0.3rem; }
        .weather-icon { font-size: 5rem; margin: 0.5rem 0; }
        .temperature { font-size: 3.5rem; font-weight: bold; color: #4ecca3; direction: ltr; }
        .description { font-size: 1.2rem; color: #a2a8d3; margin-bottom: 1rem; }
        .details {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 1rem;
        }
        .detail-item {
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px;
            text-align: center;
        }
        .detail-item .val { font-size: 1.2rem; font-weight: bold; color: #f39c12; direction: ltr; }
        .detail-item .lbl { font-size: 0.75rem; color: #888; margin-top: 2px; }
        .loading { display: none; margin: 1rem 0; }
        .loading.show { display: block; }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #333; border-top-color: #e94560;
            border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg { color: #e94560; margin-top: 1rem; display: none; }
        .cities-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 1rem; }
        .city-chip {
            background: #2a2a2a; color: #ccc; border: 1px solid #444; padding: 6px 14px;
            border-radius: 20px; cursor: pointer; font-size: 0.85rem; transition: 0.2s; font-family: inherit;
        }
        .city-chip:hover { background: #e94560; color: white; border-color: #e94560; }
    </style>
</head>
<body>
    <div class="app">
        <div class="title">🌤️ هواشناسی</div>
        
        <div class="cities-row">
            <button class="city-chip" onclick="getWeather('Tehran')">تهران</button>
            <button class="city-chip" onclick="getWeather('Mashhad')">مشهد</button>
            <button class="city-chip" onclick="getWeather('Esfahan')">اصفهان</button>
            <button class="city-chip" onclick="getWeather('Shiraz')">شیراز</button>
            <button class="city-chip" onclick="getWeather('Tabriz')">تبریز</button>
        </div>

        <div class="search-row">
            <input type="text" id="cityInput" placeholder="نام شهر به انگلیسی..." onkeypress="if(event.key==='Enter') getWeather()">
            <button onclick="getWeather()">🔍</button>
        </div>

        <div class="loading" id="loading"><div class="spinner"></div></div>
        <div class="error-msg" id="errorMsg">شهر مورد نظر یافت نشد!</div>

        <div class="weather-card" id="weatherCard">
            <div class="city-name" id="cityName">-</div>
            <div class="weather-icon" id="weatherIcon">☀️</div>
            <div class="temperature" id="temperature">--°</div>
            <div class="description" id="description">-</div>
            <div class="details">
                <div class="detail-item"><div class="val" id="feelsLike">--°</div><div class="lbl">حس واقعی</div></div>
                <div class="detail-item"><div class="val" id="humidity">--%</div><div class="lbl">رطوبت</div></div>
                <div class="detail-item"><div class="val" id="wind">--</div><div class="lbl">باد (km/h)</div></div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'bd5e378503939ddaee76f12ad7a97608'; // OpenWeatherMap API key رایگان
        const weatherIcons = {
            'Clear': '☀️', 'Clouds': '☁️', 'Rain': '🌧️', 'Drizzle': '🌦️',
            'Thunderstorm': '⛈️', 'Snow': '❄️', 'Mist': '🌫️', 'Haze': '🌫️', 'Fog': '🌫️'
        };

        async function getWeather(cityName = null) {
            const city = cityName || document.getElementById('cityInput').value.trim();
            if (!city) return;

            document.getElementById('loading').classList.add('show');
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('weatherCard').classList.remove('show');

            try {
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric&lang=fa`
                );
                
                if (!response.ok) throw new Error('City not found');
                
                const data = await response.json();
                displayWeather(data);
            } catch (err) {
                // روش دوم: API جایگزین (رایگان بدون کلید)
                try {
                    const response2 = await fetch(
                        `https://wttr.in/${city}?format=j1&lang=fa`
                    );
                    if (!response2.ok) throw new Error();
                    const data2 = await response2.json();
                    displayWeather2(data2, city);
                } catch (err2) {
                    document.getElementById('errorMsg').style.display = 'block';
                }
            }

            document.getElementById('loading').classList.remove('show');
        }

        function displayWeather(data) {
            document.getElementById('cityName').textContent = data.name + ', ' + data.sys.country;
            document.getElementById('temperature').textContent = Math.round(data.main.temp) + '°C';
            document.getElementById('description').textContent = data.weather[0].description;
            document.getElementById('feelsLike').textContent = Math.round(data.main.feels_like) + '°C';
            document.getElementById('humidity').textContent = data.main.humidity + '%';
            document.getElementById('wind').textContent = Math.round(data.wind.speed * 3.6);
            
            const condition = data.weather[0].main;
            document.getElementById('weatherIcon').textContent = weatherIcons[condition] || '🌡️';
            
            document.getElementById('weatherCard').classList.add('show');
        }

        function displayWeather2(data, city) {
            const current = data.current_condition[0];
            document.getElementById('cityName').textContent = city;
            document.getElementById('temperature').textContent = current.temp_C + '°C';
            document.getElementById('description').textContent = current.weatherDesc[0].value;
            document.getElementById('feelsLike').textContent = current.FeelsLikeC + '°C';
            document.getElementById('humidity').textContent = current.humidity + '%';
            document.getElementById('wind').textContent = current.windspeedKmph;
            document.getElementById('weatherIcon').textContent = '🌡️';
            document.getElementById('weatherCard').classList.add('show');
        }

        // بارگذاری خودکار تهران
        getWeather('Tehran');
    </script>
</body>
</html>
