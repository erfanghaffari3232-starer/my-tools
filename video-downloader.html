<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دانلودر ویدئو از لینک</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: white;
        }
        .downloader {
            background: #1a1a1a;
            border-radius: 24px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 2px solid #e94560;
        }
        .title {
            text-align: center;
            font-size: 1.8rem;
            color: #e94560;
            margin-bottom: 0.3rem;
            text-shadow: 0 0 20px rgba(233,69,96,0.5);
        }
        .subtitle {
            text-align: center;
            color: #a2a8d3;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }
        input[type="text"] {
            flex: 1;
            background: #0d0d1a;
            border: 2px solid #533483;
            padding: 14px 18px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
            direction: ltr;
            text-align: left;
            transition: all 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #e94560;
            box-shadow: 0 0 15px rgba(233,69,96,0.2);
        }
        input[type="text"]::placeholder {
            color: #666;
        }
        .fetch-btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .fetch-btn:hover {
            background: #c73652;
            box-shadow: 0 0 20px rgba(233,69,96,0.4);
        }
        .fetch-btn:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .preview-area {
            background: #0a0a0a;
            border-radius: 16px;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            border: 1px solid #333;
            overflow: hidden;
            position: relative;
        }
        video {
            width: 100%;
            max-height: 350px;
            display: none;
        }
        .placeholder {
            color: #555;
            font-size: 1.1rem;
            text-align: center;
        }
        .placeholder .icon {
            font-size: 4rem;
            display: block;
            margin-bottom: 10px;
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 1.5rem;
            background: #0d0d1a;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ccc;
            font-size: 0.9rem;
        }
        .info-value {
            color: #4ecca3;
            font-weight: bold;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .download-btn {
            flex: 1;
            background: #4ecca3;
            color: #1a1a1a;
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 150px;
        }
        .download-btn:hover {
            background: #3baa8a;
            transform: scale(1.02);
        }
        .download-btn:disabled {
            background: #555;
            color: #999;
            cursor: not-allowed;
            transform: none;
        }
        .copy-btn {
            background: #533483;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }
        .copy-btn:hover {
            background: #6c3fa0;
        }
        .history {
            margin-top: 1.5rem;
        }
        .history h4 {
            color: #a2a8d3;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 150px;
            overflow-y: auto;
        }
        .history-item {
            background: #2a2a2a;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #ccc;
            cursor: pointer;
            transition: 0.3s;
            direction: ltr;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-item:hover {
            background: #333;
            border-left: 3px solid #e94560;
        }
        .status {
            text-align: center;
            margin-top: 1rem;
            min-height: 24px;
            font-size: 0.9rem;
        }
        .loading-spinner {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid #333;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="downloader">
        <div class="title">📥 دانلودر ویدئو</div>
        <div class="subtitle">لینک ویدئو را وارد کنید تا دانلود شود</div>

        <!-- ورودی لینک -->
        <div class="input-group">
            <input type="text" id="videoUrl" placeholder="https://example.com/video.mp4" dir="ltr">
            <button class="fetch-btn" id="fetchBtn" onclick="fetchVideo()">🔍 تشخیص</button>
        </div>

        <!-- پیش‌نمایش -->
        <div class="preview-area" id="previewArea">
            <div class="placeholder" id="placeholder">
                <span class="icon">🎬</span>
                لینک ویدئو را وارد کنید
            </div>
            <video id="videoPreview" controls controlsList="nodownload"></video>
            <div class="loading-spinner" id="loadingSpinner"></div>
        </div>

        <!-- اطلاعات -->
        <div class="info-bar" id="infoBar" style="display:none;">
            <div class="info-item">
                📁 نوع فایل: <span class="info-value" id="fileType">-</span>
            </div>
            <div class="info-item">
                📏 حجم: <span class="info-value" id="fileSize">-</span>
            </div>
            <div class="info-item">
                ⏱️ مدت: <span class="info-value" id="duration">-</span>
            </div>
        </div>

        <!-- دکمه‌ها -->
        <div class="btn-row">
            <button class="download-btn" id="downloadBtn" onclick="downloadVideo()" disabled>
                💾 دانلود ویدئو
            </button>
            <button class="copy-btn" onclick="copyUrl()">
                📋 کپی لینک
            </button>
        </div>

        <!-- وضعیت -->
        <div class="status" id="statusMessage"></div>

        <!-- تاریخچه -->
        <div class="history" id="historySection" style="display:none;">
            <h4>📜 تاریخچه دانلودها</h4>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <script>
        const videoUrlInput = document.getElementById('videoUrl');
        const fetchBtn = document.getElementById('fetchBtn');
        const videoPreview = document.getElementById('videoPreview');
        const placeholder = document.getElementById('placeholder');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const downloadBtn = document.getElementById('downloadBtn');
        const infoBar = document.getElementById('infoBar');
        const statusMessage = document.getElementById('statusMessage');
        const historySection = document.getElementById('historySection');
        const historyList = document.getElementById('historyList');

        let currentVideoUrl = '';
        let history = JSON.parse(localStorage.getItem('videoDownloadHistory') || '[]');

        // نمایش تاریخچه
        function renderHistory() {
            if (history.length === 0) {
                historySection.style.display = 'none';
                return;
            }
            historySection.style.display = 'block';
            historyList.innerHTML = history.map((item, index) => `
                <div class="history-item" onclick="loadFromHistory(${index})" title="${item.url}">
                    🎬 ${item.url.substring(0, 60)}${item.url.length > 60 ? '...' : ''}
                    <span style="color:#666;font-size:0.75rem;"> (${item.date})</span>
                </div>
            `).join('');
        }

        function loadFromHistory(index) {
            videoUrlInput.value = history[index].url;
            fetchVideo();
        }

        // تشخیص ویدئو
        async function fetchVideo() {
            const url = videoUrlInput.value.trim();
            
            if (!url) {
                showStatus('❌ لطفاً یک لینک وارد کنید.', '#e94560');
                return;
            }

            // بررسی فرمت‌های معروف
            const videoExtensions = ['.mp4', '.webm', '.ogg', '.mov', '.avi', '.mkv', '.m3u8', '.ts'];
            const isDirectVideo = videoExtensions.some(ext => url.toLowerCase().includes(ext));
            
            currentVideoUrl = url;
            
            // نمایش لودینگ
            videoPreview.style.display = 'none';
            placeholder.style.display = 'none';
            loadingSpinner.style.display = 'block';
            fetchBtn.disabled = true;
            downloadBtn.disabled = true;
            infoBar.style.display = 'none';
            showStatus('⏳ در حال بررسی لینک...', '#a2a8d3');

            try {
                if (isDirectVideo) {
                    // لینک مستقیم به فایل ویدئو
                    await loadDirectVideo(url);
                } else {
                    // لینک غیرمستقیم (مثلاً یوتیوب و...)
                    // تلاش می‌کنیم به عنوان ویدئوی مستقیم لود کنیم
                    await loadDirectVideo(url);
                }
            } catch (err) {
                showStatus('⚠️ نمی‌توان ویدئو را مستقیماً دانلود کرد. روی دکمه دانلود کلیک کنید تا در تب جدید باز شود.', '#ff6b6b');
                videoPreview.style.display = 'none';
                placeholder.style.display = 'block';
                placeholder.innerHTML = '<span class="icon">🔗</span>لینک آماده دانلود است';
                downloadBtn.disabled = false;
                infoBar.style.display = 'flex';
                updateFileInfo(url, null);
            }

            loadingSpinner.style.display = 'none';
            fetchBtn.disabled = false;
        }

        async function loadDirectVideo(url) {
            return new Promise((resolve, reject) => {
                videoPreview.src = url;
                videoPreview.style.display = 'block';
                placeholder.style.display = 'none';
                
                videoPreview.onloadedmetadata = () => {
                    downloadBtn.disabled = false;
                    infoBar.style.display = 'flex';
                    updateFileInfo(url, videoPreview);
                    
                    // اضافه به تاریخچه
                    addToHistory(url);
                    
                    showStatus('✅ ویدئو با موفقیت شناسایی شد.', '#4ecca3');
                    resolve();
                };
                
                videoPreview.onerror = () => {
                    reject(new Error('Cannot load video'));
                };

                // تایم‌اوت ۵ ثانیه
                setTimeout(() => {
                    if (videoPreview.readyState < 2) {
                        resolve(); // ادامه بده حتی اگر متادیتا نیومد
                        downloadBtn.disabled = false;
                        infoBar.style.display = 'flex';
                        updateFileInfo(url, null);
                        showStatus('⚠️ پیش‌نمایش در دسترس نیست، اما می‌توانید دانلود کنید.', '#ff6b6b');
                    }
                }, 5000);
            });
        }

        function updateFileInfo(url, videoElement) {
            // نوع فایل
            const extension = url.split('.').pop().split('?')[0].toUpperCase() || '?';
            document.getElementById('fileType').textContent = extension;

            // حجم (اگر در دسترس باشه - معمولاً از طریق HEAD request)
            document.getElementById('fileSize').textContent = 'در حال بررسی...';
            estimateFileSize(url);

            // مدت زمان
            if (videoElement && videoElement.duration) {
                const mins = Math.floor(videoElement.duration / 60);
                const secs = Math.floor(videoElement.duration % 60);
                document.getElementById('duration').textContent = `${mins}:${String(secs).padStart(2, '0')}`;
            } else {
                document.getElementById('duration').textContent = 'نامشخص';
            }
        }

        async function estimateFileSize(url) {
            try {
                const response = await fetch(url, { method: 'HEAD' });
                const contentLength = response.headers.get('content-length');
                if (contentLength) {
                    const sizeMB = (parseInt(contentLength) / (1024 * 1024)).toFixed(2);
                    document.getElementById('fileSize').textContent = sizeMB + ' MB';
                } else {
                    document.getElementById('fileSize').textContent = 'نامشخص';
                }
            } catch (e) {
                document.getElementById('fileSize').textContent = 'نامشخص';
            }
        }

        // دانلود ویدئو
        async function downloadVideo() {
            if (!currentVideoUrl) return;

            showStatus('⏳ در حال آماده‌سازی دانلود...', '#a2a8d3');
            downloadBtn.disabled = true;

            try {
                // روش ۱: دانلود مستقیم با fetch و blob
                const response = await fetch(currentVideoUrl);
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = blobUrl;
                
                // اسم فایل از URL استخراج بشه
                let filename = currentVideoUrl.split('/').pop().split('?')[0];
                if (!filename.includes('.')) filename = 'video.mp4';
                a.download = filename;
                
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                URL.revokeObjectURL(blobUrl);
                showStatus('✅ دانلود با موفقیت شروع شد!', '#4ecca3');
            } catch (err) {
                // روش ۲: باز کردن در تب جدید
                showStatus('🔄 در حال باز کردن در تب جدید...', '#a2a8d3');
                window.open(currentVideoUrl, '_blank');
                showStatus('✅ لینک در تب جدید باز شد. برای ذخیره، راست‌کلیک کرده و Save Video As... را بزنید.', '#4ecca3');
            }

            downloadBtn.disabled = false;
        }

        // کپی لینک
        function copyUrl() {
            if (!currentVideoUrl) {
                showStatus('❌ ابتدا یک لینک وارد کنید.', '#e94560');
                return;
            }
            navigator.clipboard.writeText(currentVideoUrl).then(() => {
                showStatus('📋 لینک کپی شد!', '#4ecca3');
            });
        }

        // تاریخچه
        function addToHistory(url) {
            // حذف تکراری
            history = history.filter(item => item.url !== url);
            
            history.unshift({
                url: url,
                date: new Date().toLocaleDateString('fa-IR')
            });
            
            // حداکثر ۱۰ آیتم
            if (history.length > 10) history.pop();
            
            localStorage.setItem('videoDownloadHistory', JSON.stringify(history));
            renderHistory();
        }

        function showStatus(message, color) {
            statusMessage.textContent = message;
            statusMessage.style.color = color;
            setTimeout(() => {
                if (statusMessage.textContent === message) {
                    statusMessage.textContent = '';
                }
            }, 5000);
        }

        // کیبورد
        videoUrlInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                fetchVideo();
            }
        });

        // راه‌اندازی
        renderHistory();
    </script>
</body>
</html>
