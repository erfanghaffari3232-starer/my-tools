<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گالری عکس با اسلایدر</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0a0a0a; min-height: 100vh; padding: 20px; color: white;
        }
        .app {
            max-width: 900px; margin: 0 auto; background: #1a1a1a; border-radius: 24px;
            padding: 1.5rem; box-shadow: 0 20px 60px rgba(0,0,0,0.6); border: 2px solid #e94560;
        }
        .title { text-align: center; font-size: 1.8rem; color: #e94560; margin-bottom: 0.3rem; }
        .subtitle { text-align: center; color: #a2a8d3; margin-bottom: 1rem; font-size: 0.9rem; }
        .upload-area {
            border: 2px dashed #533483; border-radius: 16px; padding: 2rem; text-align: center;
            margin-bottom: 1rem; cursor: pointer; transition: 0.3s; background: #0d0d1a;
        }
        .upload-area:hover { border-color: #e94560; background: #1a1a2e; }
        .upload-area span { font-size: 3rem; display: block; margin-bottom: 0.5rem; }
        .upload-area p { color: #888; }
        .upload-area input { display: none; }
        .slider-container {
            position: relative; margin-bottom: 1rem; background: #000; border-radius: 16px;
            overflow: hidden; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center;
        }
        .slider-container img {
            max-width: 100%; max-height: 100%; object-fit: contain; transition: opacity 0.5s ease;
        }
        .slider-nav {
            position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6);
            color: white; border: none; width: 40px; height: 40px; border-radius: 50%;
            cursor: pointer; font-size: 1.5rem; display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .slider-nav:hover { background: rgba(233,69,96,0.8); }
        .slider-nav.prev { right: 10px; }
        .slider-nav.next { left: 10px; }
        .slider-counter {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); padding: 4px 12px; border-radius: 15px; font-size: 0.8rem;
        }
        .thumbnail-row {
            display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; flex-wrap: wrap;
        }
        .thumbnail {
            width: 80px; height: 60px; border-radius: 8px; object-fit: cover; cursor: pointer;
            border: 2px solid transparent; transition: 0.3s; opacity: 0.6; flex-shrink: 0;
        }
        .thumbnail:hover { opacity: 0.9; border-color: #e94560; }
        .thumbnail.active { opacity: 1; border-color: #e94560; box-shadow: 0 0 10px rgba(233,69,96,0.5); }
        .controls-row {
            display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 0.5rem;
        }
        .controls-row button {
            background: #2a2a2a; color: white; border: 1px solid #444; padding: 10px 18px;
            border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 0.85rem; transition: 0.3s;
        }
        .controls-row button:hover { background: #e94560; border-color: #e94560; }
        .controls-row .play-btn { background: #4ecca3; color: #1a1a1a; border-color: #4ecca3; }
        .controls-row .play-btn:hover { background: #3baa8a; }
        .empty-gallery {
            text-align: center; padding: 3rem; color: #555;
        }
        .empty-gallery span { font-size: 5rem; display: block; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="app">
        <div class="title">🖼️ گالری عکس</div>
        <div class="subtitle">عکس‌های خود را آپلود و مشاهده کنید</div>

        <!-- آپلود -->
        <label class="upload-area" for="imageUpload">
            <span>📷</span>
            <p>کلیک کنید یا عکس را بکشید و رها کنید</p>
            <input type="file" id="imageUpload" accept="image/*" multiple>
        </label>

        <!-- اسلایدر -->
        <div class="slider-container" id="sliderContainer">
            <div class="empty-gallery" id="emptyState">
                <span>🖼️</span>
                <p>عکسی برای نمایش وجود ندارد</p>
            </div>
            <img id="mainImage" style="display:none;" alt="تصویر">
            <button class="slider-nav prev" onclick="prevImage()" style="display:none;">❮</button>
            <button class="slider-nav next" onclick="nextImage()" style="display:none;">❯</button>
            <div class="slider-counter" id="sliderCounter" style="display:none;">1 / 1</div>
        </div>

        <!-- تامنیل‌ها -->
        <div class="thumbnail-row" id="thumbnailRow"></div>

        <!-- کنترل‌ها -->
        <div class="controls-row" id="controlsRow" style="display:none;">
            <button onclick="prevImage()">◀ قبلی</button>
            <button class="play-btn" id="slideshowBtn" onclick="toggleSlideshow()">▶ اسلایدشو</button>
            <button onclick="nextImage()">بعدی ▶</button>
            <button onclick="deleteCurrentImage()">🗑️ حذف</button>
            <button onclick="downloadCurrentImage()">💾 دانلود</button>
        </div>
    </div>

    <script>
        let images = JSON.parse(localStorage.getItem('galleryImages') || '[]');
        let currentIndex = 0;
        let slideshowInterval = null;
        let isSlideshowOn = false;

        const imageUpload = document.getElementById('imageUpload');
        const mainImage = document.getElementById('mainImage');
        const emptyState = document.getElementById('emptyState');
        const sliderCounter = document.getElementById('sliderCounter');
        const thumbnailRow = document.getElementById('thumbnailRow');
        const controlsRow = document.getElementById('controlsRow');
        const slideshowBtn = document.getElementById('slideshowBtn');

        // آپلود عکس
        imageUpload.addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    images.push({
                        id: Date.now() + Math.random(),
                        dataUrl: event.target.result,
                        name: file.name,
                        date: new Date().toISOString()
                    });
                    saveAndRender();
                    if (images.length === 1) {
                        currentIndex = 0;
                        showImage(0);
                    }
                };
                reader.readDataURL(file);
            });
            
            imageUpload.value = '';
        });

        // نمایش تصویر
        function showImage(index) {
            if (images.length === 0) {
                mainImage.style.display = 'none';
                emptyState.style.display = 'block';
                sliderCounter.style.display = 'none';
                document.querySelector('.slider-nav.prev').style.display = 'none';
                document.querySelector('.slider-nav.next').style.display = 'none';
                controlsRow.style.display = 'none';
                thumbnailRow.innerHTML = '';
                return;
            }

            currentIndex = Math.max(0, Math.min(index, images.length - 1));
            mainImage.src = images[currentIndex].dataUrl;
            mainImage.style.display = 'block';
            emptyState.style.display = 'none';
            sliderCounter.style.display = 'block';
            sliderCounter.textContent = `${currentIndex + 1} / ${images.length}`;
            document.querySelector('.slider-nav.prev').style.display = 'flex';
            document.querySelector('.slider-nav.next').style.display = 'flex';
            controlsRow.style.display = 'flex';

            renderThumbnails();
        }

        function prevImage() {
            if (images.length === 0) return;
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            showImage(currentIndex);
        }

        function nextImage() {
            if (images.length === 0) return;
            currentIndex = (currentIndex + 1) % images.length;
            showImage(currentIndex);
        }

        // تامنیل‌ها
        function renderThumbnails() {
            thumbnailRow.innerHTML = images.map((img, i) => `
                <img src="${img.dataUrl}" class="thumbnail ${i === currentIndex ? 'active' : ''}" 
                     onclick="showImage(${i})" alt="${img.name}" title="${img.name}">
            `).join('');
        }

        // اسلایدشو
        function toggleSlideshow() {
            if (isSlideshowOn) {
                stopSlideshow();
            } else {
                startSlideshow();
            }
        }

        function startSlideshow() {
            if (images.length <= 1) return;
            isSlideshowOn = true;
            slideshowBtn.textContent = '⏸ توقف';
            slideshowBtn.style.background = '#e94560';
            slideshowInterval = setInterval(() => {
                nextImage();
            }, 2000);
        }

        function stopSlideshow() {
            isSlideshowOn = false;
            slideshowBtn.textContent = '▶ اسلایدشو';
            slideshowBtn.style.background = '#4ecca3';
            clearInterval(slideshowInterval);
        }

        // حذف
        function deleteCurrentImage() {
            if (images.length === 0) return;
            if (!confirm('آیا از حذف این عکس مطمئن هستید؟')) return;
            
            images.splice(currentIndex, 1);
            
            if (images.length === 0) {
                currentIndex = 0;
                stopSlideshow();
            } else if (currentIndex >= images.length) {
                currentIndex = images.length - 1;
            }
            
            saveAndRender();
            showImage(currentIndex);
        }

        // دانلود
        function downloadCurrentImage() {
            if (images.length === 0) return;
            
            const link = document.createElement('a');
            link.href = images[currentIndex].dataUrl;
            link.download = images[currentIndex].name || 'image.jpg';
            link.click();
        }

        // کیبورد
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
            if (e.key === ' ') { e.preventDefault(); toggleSlideshow(); }
            if (e.key === 'Delete') deleteCurrentImage();
        });

        function saveAndRender() {
            localStorage.setItem('galleryImages', JSON.stringify(images));
        }

        // شروع
        if (images.length > 0) {
            showImage(0);
        } else {
            showImage(-1);
        }
    </script>
</body>
</html>
